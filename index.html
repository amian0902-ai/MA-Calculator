<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS Calculator</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff9500">
</head>

<body>

<div class="calculator">

<div class="display">
<div id="history"></div>
<div id="result">0</div>
</div>

<div class="buttons">

<button class="gray clear">AC</button>
<button class="gray plusminus">+/-</button>
<button class="gray percent">%</button>
<button class="orange operator">÷</button>

<button class="dark number">7</button>
<button class="dark number">8</button>
<button class="dark number">9</button>
<button class="orange operator">×</button>

<button class="dark number">4</button>
<button class="dark number">5</button>
<button class="dark number">6</button>
<button class="orange operator">−</button>

<button class="dark number">1</button>
<button class="dark number">2</button>
<button class="dark number">3</button>
<button class="orange operator">+</button>

<button class="dark zero number">0</button>
<button class="dark decimal">.</button>
<button class="orange equal">=</button>

</div>

</div>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js");
  });
}
</script>

</body>
</html>
